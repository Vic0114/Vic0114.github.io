// 答题逻辑
let current = 0;
let answers = {};
let score = {};
themes.forEach(t => score[t] = 0);

// 定义评分映射表
const scoreMap = {
  "A+": 3,  // 特别同意A
  "A": 2,   // 比较同意A
  "M": 1,   // 居中
  "B": 2,   // 比较同意B
  "B+": 3   // 特别同意B
};

function render(){
const q = questions[current];
document.getElementById("progress").textContent = `第 ${q.id} 题 / 共180题`;
document.getElementById("question").innerHTML = `
<h2>A：${q.a}<br><br>B：${q.b}</h2>
<div class="opt ${answers[q.id]=='A+'?'selected':''}" data-v="A+">特别同意 A（3分）</div>
<div class="opt ${answers[q.id]=='A'?'selected':''}" data-v="A">比较同意 A（2分）</div>
<div class="opt ${answers[q.id]=='M'?'selected':''}" data-v="M">居中（1分）</div>
<div class="opt ${answers[q.id]=='B'?'selected':''}" data-v="B">比较同意 B（2分）</div>
<div class="opt ${answers[q.id]=='B+'?'selected':''}" data-v="B+">特别同意 B（3分）</div>
`;
document.querySelectorAll(".opt").forEach(o=>{
o.onclick = ()=>{
document.querySelectorAll(".opt").forEach(x=>x.classList.remove("selected"));
o.classList.add("selected");
answers[q.id] = o.dataset.v;
}
});
if(current === 0) document.getElementById("prev").disabled = true;
else document.getElementById("prev").disabled = false;
if(current === questions.length-1){
document.getElementById("next").style.display = "none";
document.getElementById("submit").style.display = "block";
}else{
document.getElementById("next").style.display = "block";
document.getElementById("submit").style.display = "none";
}
}

document.getElementById("next").onclick = ()=>{
if(!answers[questions[current].id]){alert("请选择一项");return;}
current++; render();
};
document.getElementById("prev").onclick = ()=>{current--; render();};

document.getElementById("submit").onclick = ()=>{
if(Object.keys(answers).length < 180){alert("请完成所有题目");return;}
questions.forEach(q=>{
// 根据选择的选项获取对应的分数
const s = scoreMap[answers[q.id]] || 1;
score[q.t] += s;
});
const sorted = Object.entries(score).sort((a,b)=>b[1]-a[1]);
let html = "";
sorted.forEach(([t,s],i)=>{
html += `<div class="score-item ${i<5?'top5':''}">${i+1}. ${t} <span>${s}分</span></div>`;
});
document.getElementById("scoreList").innerHTML = html;
document.querySelector(".result").style.display = "block";
};

render();
</script>
